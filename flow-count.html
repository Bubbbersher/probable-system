<meta name="apple-mobile-web-app-title" content="Flow Count" />
<title>Flow Count</title>
<style>
  :root {
    --bg: #0D0F14;
    --surface: #171A21;
    --surface-elevated: #1F232C;
    --border: #2A2F3A;
    --text-primary: #F5F6F8;
    --text-secondary: #9BA1AC;
    --text-muted: #6B7280;
    --primary: #5B8DEF;
    --primary-muted: rgba(91,141,239,0.15);
    --advance: #34D399;
    --advance-muted: rgba(52,211,153,0.15);
    --expense: #F87171;
    --expense-muted: rgba(248,113,113,0.15);
    --overlay: rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overscroll-behavior-y: contain;
  }
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 560px; margin: 0 auto; position: relative; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: max(20px, env(safe-area-inset-top)) 20px 12px 20px; flex-shrink: 0; gap: 8px; }
  .header-title { font-size: 28px; font-weight: 800; }
  .header-title.center { flex: 1; text-align: center; font-size: 19px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-actions { display: flex; align-items: center; gap: 2px; }
  .icon-btn { background: none; border: none; padding: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); cursor: pointer; }
  .icon-btn:active { opacity: 0.6; }

  .scroll { flex: 1; overflow-y: auto; padding: 0 16px; -webkit-overflow-scrolling: touch; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 30px; color: var(--text-muted); height: 100%; }
  .empty-state svg { margin-bottom: 16px; opacity: 0.5; }
  .empty-title { color: var(--text-primary); font-size: 17px; font-weight: 700; margin-top: 4px; }
  .empty-subtitle { color: var(--text-muted); font-size: 14px; margin-top: 6px; line-height: 20px; max-width: 280px; }
  .empty-inline { color: var(--text-muted); text-align: center; padding: 30px 10px; font-size: 14px; }

  .card { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .card:active { background: var(--surface-elevated); }
  .card-info { flex: 1; min-width: 0; margin-right: 8px; }
  .card-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-subtitle { color: var(--text-muted); font-size: 12px; margin-top: 3px; }
  .card-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .entry-card { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .entry-card:active { background: var(--surface-elevated); }
  .entry-icon { width: 40px; height: 40px; border-radius: 999px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
  .entry-mid { flex: 1; min-width: 0; margin-right: 8px; }
  .entry-top-row { display: flex; align-items: center; gap: 4px; color: var(--text-secondary); font-size: 12.5px; font-weight: 600; }
  .entry-desc { color: var(--text-primary); font-size: 15px; margin-top: 3px; word-break: break-word; }
  .entry-date { display: flex; align-items: center; color: var(--text-muted); font-size: 11.5px; margin-top: 4px; }
  .photo-badge { display: inline-flex; color: var(--text-muted); margin-left: 6px; }
  .entry-amount { font-size: 16px; font-weight: 800; flex-shrink: 0; white-space: nowrap; }

  .btn-primary { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; width: 100%; }
  .btn-primary:active { opacity: 0.85; }
  .fab-wrap { padding: 12px 16px; flex-shrink: 0; }

  .balance-summary { background: var(--surface-elevated); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 14px 20px 16px 20px; flex-shrink: 0; }
  .balance-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .balance-divider { height: 1px; background: var(--border); margin: 4px 0; }
  .balance-label { font-size: 15px; font-weight: 700; }
  .balance-status { font-size: 11.5px; font-weight: 600; margin-top: 2px; }
  .balance-value { font-size: 20px; font-weight: 800; }
  .settle-line { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); text-align: center; font-size: 13.5px; font-weight: 700; }

  .search-filter-bar { padding: 0 16px 10px 16px; flex-shrink: 0; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text-muted); margin-bottom: 8px; }
  .search-box input { flex: 1; background: none; border: none; padding: 0; font-size: 15px; color: var(--text-primary); }
  .search-box input:focus { outline: none; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .filter-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 12.5px; font-weight: 700; color: var(--text-secondary); cursor: pointer; }
  .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .filter-chip[data-value="advance"].active { background: var(--advance); border-color: var(--advance); color: #062b1a; }
  .filter-chip[data-value="expense"].active { background: var(--expense); border-color: var(--expense); color: #3a0a0a; }
  .filter-sep { width: 1px; align-self: stretch; background: var(--border); margin: 0 2px; }

  .modal-overlay { position: fixed; inset: 0; background: var(--overlay); display: flex; align-items: flex-end; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.15s ease; }
  .modal-overlay.center { align-items: center; padding: 20px; }
  .modal-overlay.visible { opacity: 1; pointer-events: auto; }
  .modal-sheet { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 18px 18px 0 0; padding: 20px; width: 100%; max-width: 560px; max-height: 88dvh; overflow-y: auto; padding-bottom: max(20px, env(safe-area-inset-bottom)); transform: translateY(20px); transition: transform 0.15s ease; }
  .modal-overlay.center .modal-sheet { border-radius: 18px; max-width: 420px; transform: translateY(0); }
  .modal-overlay.visible .modal-sheet { transform: translateY(0); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-title { font-size: 19px; font-weight: 800; }

  .field-label { color: var(--text-secondary); font-size: 12px; font-weight: 700; margin: 16px 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .field-label:first-of-type { margin-top: 0; }

  .toggle-group { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; gap: 4px; }

<body>
<div id="app"></div>

<script>
/* ============================================================
   STORAGE LAYER — the only place that talks to the browser's storage.
   Uses plain localStorage so this works as a fully standalone page in
   any browser — no dependency on any external bridge or service.
   ============================================================ */
const Storage = {
  async get(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (raw === null) return fallback;
      return JSON.parse(raw);
    } catch (e) {
      console.error('Storage read failed', key, e);
      return fallback;
    }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (e) {
      console.error('Storage write failed', key, e);
      if (typeof showToast === 'function') showToast('Could not save — your device storage may be full.');
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
    } catch (e) {
      // key may not exist — fine to ignore
    }
  }
};

const KEYS = {
  SITES: 'ledger_sites_v1',
  ENTRIES: 'ledger_entries_v1',
  LABELS: 'ledger_labels_v2',
  THEME: 'ledger_theme_v1',
  SNAPSHOT: 'ledger_snapshot_v1'
};
const DEFAULT_LABELS = { me: 'Me', partner: 'Partner', currency: '₹' };
const CURRENCY_PRESETS = ['₹', '$', '€', '£', '¥'];

const THEMES = {
  dark:     { bg: '#0D0F14', surface: '#171A21', surfaceElevated: '#1F232C', border: '#2A2F3A', textPrimary: '#F5F6F8', textSecondary: '#9BA1AC', textMuted: '#6B7280', primary: '#5B8DEF' },
  midnight: { bg: '#0B1120', surface: '#111827', surfaceElevated: '#1A2333', border: '#26314A', textPrimary: '#F1F5F9', textSecondary: '#94A3B8', textMuted: '#64748B', primary: '#818CF8' },
  forest:   { bg: '#0E1613', surface: '#16211C', surfaceElevated: '#1D2B24', border: '#2A3B32', textPrimary: '#F0F5F2', textSecondary: '#9CB3A8', textMuted: '#6B8277', primary: '#4ADE80' },
  amber:    { bg: '#1A1410', surface: '#241C15', surfaceElevated: '#2E241B', border: '#3D2F22', textPrimary: '#F7F1E8', textSecondary: '#B8A890', textMuted: '#7A6D5A', primary: '#F0A93F' },
  ocean:    { bg: '#081619', surface: '#0F2226', surfaceElevated: '#163035', border: '#1F4247', textPrimary: '#EAF7F8', textSecondary: '#8FB5B9', textMuted: '#5C7D80', primary: '#2DD4BF' },
  rose:     { bg: '#170B10', surface: '#23121A', surfaceElevated: '#2E1922', border: '#40232E', textPrimary: '#F8EEF2', textSecondary: '#C29AAB', textMuted: '#8A6575', primary: '#F472B6' },
  light:    { bg: '#F5F6F8', surface: '#FFFFFF', surfaceElevated: '#F0F1F4', border: '#E2E4E9', textPrimary: '#14171F', textSecondary: '#5B616E', textMuted: '#8A8F99', primary: '#3B6FE0' },
  slate:    { bg: '#EEF1F5', surface: '#FFFFFF', surfaceElevated: '#E4E9F0', border: '#D3DAE4', textPrimary: '#1B2430', textSecondary: '#566072', textMuted: '#8993A4', primary: '#6366F1' }
};

function applyTheme(key) {
  const t = THEMES[key] || THEMES.dark;
  const root = document.documentElement;
  root.style.setProperty('--bg', t.bg);
  root.style.setProperty('--surface', t.surface);
  root.style.setProperty('--surface-elevated', t.surfaceElevated);
  root.style.setProperty('--border', t.border);
  root.style.setProperty('--text-primary', t.textPrimary);
  root.style.setProperty('--text-secondary', t.textSecondary);
  root.style.setProperty('--text-muted', t.textMuted);
  root.style.setProperty('--primary', t.primary);
  root.style.setProperty('--primary-muted', t.primary + '26');
  const meta = document.querySelector('meta[name=theme-color]');
  if (meta) meta.setAttribute('content', t.bg);
}

function genId() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
}

const DB = {
  async getSites() {
    const sites = await Storage.get(KEYS.SITES, []);
    // Active sites first (newest first), completed sites after (newest first).
    return [...sites].sort((a, b) => {
      if (!!a.completed !== !!b.completed) return a.completed ? 1 : -1;
      return b.createdAt - a.createdAt;
    });
  },
  async addSite(name) {
    const sites = await Storage.get(KEYS.SITES, []);
    const site = { id: genId(), name: name.trim(), createdAt: Date.now(), completed: false };
    await Storage.set(KEYS.SITES, [site, ...sites]);
    return site;
  },
  async renameSite(id, name) {
    const sites = await Storage.get(KEYS.SITES, []);
    await Storage.set(KEYS.SITES, sites.map(s => s.id === id ? { ...s, name: name.trim() } : s));
  },
  async setSiteCompleted(id, completed) {
    const sites = await Storage.get(KEYS.SITES, []);
    await Storage.set(KEYS.SITES, sites.map(s => s.id === id ? { ...s, completed } : s));
  },
  async deleteSite(id) {
    const sites = await Storage.get(KEYS.SITES, []);
    await Storage.set(KEYS.SITES, sites.filter(s => s.id !== id));
    const entries = await Storage.get(KEYS.ENTRIES, []);
    const toDelete = entries.filter(e => e.siteId === id);
    await Storage.set(KEYS.ENTRIES, entries.filter(e => e.siteId !== id));
    for (const e of toDelete) {
      if (e.hasPhoto) await Storage.delete('photo:' + e.id);
    }
  },
  async getEntriesForSite(siteId) {
    const entries = await Storage.get(KEYS.ENTRIES, []);
    return entries.filter(e => e.siteId === siteId).sort((a, b) => b.dateTime - a.dateTime);
  },
  async addEntry(entry) {
    const entries = await Storage.get(KEYS.ENTRIES, []);
    const newEntry = { ...entry, id: genId(), createdAt: Date.now() };
    await Storage.set(KEYS.ENTRIES, [newEntry, ...entries]);
    return newEntry;
  },
  async updateEntry(id, changes) {
    const entries = await Storage.get(KEYS.ENTRIES, []);
    await Storage.set(KEYS.ENTRIES, entries.map(e => e.id === id ? { ...e, ...changes, id: e.id } : e));
  },
  async deleteEntry(id) {
    const entries = await Storage.get(KEYS.ENTRIES, []);
    await Storage.set(KEYS.ENTRIES, entries.filter(e => e.id !== id));
  },
  async getLabels() {
    const stored = await Storage.get(KEYS.LABELS, {});
    return { ...DEFAULT_LABELS, ...stored };
  },
  async saveLabels(labels) {
    await Storage.set(KEYS.LABELS, labels);
  },
  async getTheme() {
    return Storage.get(KEYS.THEME, 'dark');
  },
  async saveTheme(theme) {
    await Storage.set(KEYS.THEME, theme);
  },
  async getPhoto(entryId) {
    return Storage.get('photo:' + entryId, null);
  },
  async savePhoto(entryId, dataUrl) {
    await Storage.set('photo:' + entryId, dataUrl);
  },
  async deletePhoto(entryId) {
    await Storage.delete('photo:' + entryId);
  },

  /* ---- Backup & Restore ---- */
  async buildFullBackup() {
    const sites = await Storage.get(KEYS.SITES, []);
    const entries = await Storage.get(KEYS.ENTRIES, []);
    const labels = await this.getLabels();
    const theme = await this.getTheme();
    const photos = {};
    for (const e of entries) {
      if (e.hasPhoto) {
        const p = await this.getPhoto(e.id);
        if (p) photos[e.id] = p;
      }
    }
    return { app: 'site-ledger', version: 1, exportedAt: Date.now(), sites, entries, labels, theme, photos };
  },
  async restoreFullBackup(data) {
    await Storage.set(KEYS.SITES, data.sites || []);
    await Storage.set(KEYS.ENTRIES, data.entries || []);
    await Storage.set(KEYS.LABELS, { ...DEFAULT_LABELS, ...(data.labels || {}) });
    await Storage.set(KEYS.THEME, data.theme || 'dark');
    const photos = data.photos || {};
    for (const entryId of Object.keys(photos)) {
      await Storage.set('photo:' + entryId, photos[entryId]);
    }
  },
  async saveSnapshot() {
    const backup = await this.buildFullBackup();
    await Storage.set(KEYS.SNAPSHOT, backup);
    return backup.exportedAt;
  },
  async getSnapshotMeta() {
    const snap = await Storage.get(KEYS.SNAPSHOT, null);
    return snap ? { exportedAt: snap.exportedAt } : null;
  },
  async restoreSnapshot() {
    const snap = await Storage.get(KEYS.SNAPSHOT, null);
    if (!snap) throw new Error('No snapshot found');
    await this.restoreFullBackup(snap);
  }
};

function computeBalances(entries) {
  const b = { me: 0, partner: 0 };
  for (const e of entries) {
    b[e.person] += e.type === 'advance' ? e.amount : -e.amount;
  }
  return b;
}

/**
 * "Who owes whom": average both balances (the fair share), then whoever
 * is holding more than that average owes the difference to whoever is
 * holding less. Example: Me +1000, Partner -1000 → fair share is 0,
 * so Me (sitting above it) owes Partner 1000 to equalize.
 */
function settleUpText(balances, labels) {
  const diff = (balances.me - balances.partner) / 2;
  if (Math.abs(diff) < 0.005) return 'All settled up';
  if (diff > 0) return `${labels.me} owes ${labels.partner} ${formatCurrency(diff)}`;
  return `${labels.partner} owes ${labels.me} ${formatCurrency(-diff)}`;
}

/**
 * "Settle Up & Complete Site": if the two balances aren't already equal,
 * this records the settlement as two real ledger entries — an Expense
 * for whoever is currently ahead (money leaving their hand) and an
 * Advance for whoever is behind (money reaching theirs) — so the ledger
 * stays an accurate record instead of silently zeroing things out.
 * The site is then marked completed and sinks to the bottom of the list.
 */
async function confirmSettleAndComplete() {
  const balances = computeBalances(state.entries);
  const diff = (balances.me - balances.partner) / 2;
  const alreadySettled = Math.abs(diff) < 0.005;

  const message = alreadySettled
    ? `Mark "${state.currentSiteName}" as completed? It'll move to the bottom of your sites list. You can reopen it any time.`
    : `${settleUpText(balances, state.labels)}. This will add a settlement entry recording that payment, then mark "${state.currentSiteName}" as completed. Continue?`;

  showConfirm(message, 'Complete', async () => {
    if (!alreadySettled) {
      const amount = Math.abs(diff);
      const ower = diff > 0 ? 'me' : 'partner';
      const receiver = diff > 0 ? 'partner' : 'me';
      const now = Date.now();
      await DB.addEntry({ siteId: state.currentSiteId, person: ower, type: 'expense', amount, description: 'Settlement payment', dateTime: now, hasPhoto: false });
      await DB.addEntry({ siteId: state.currentSiteId, person: receiver, type: 'advance', amount, description: 'Settlement received', dateTime: now, hasPhoto: false });
    }
    await DB.setSiteCompleted(state.currentSiteId, true);
    showToast('Site marked as completed.');
    refreshLedger();
  });
}

function formatCurrency(n) {
  const symbol = (state.labels && state.labels.currency) || '₹';
  const sign = n < 0 ? '-' : '';
  return sign + symbol + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function formatDateTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) +
    ' · ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}
function toLocalInputValue(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fromLocalInputValue(str) {
  return new Date(str).getTime();
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1000;
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   APP STATE
   ============================================================ */
let state = {
  view: 'sites',
  sites: [],
  entries: [],
  searchQuery: '',
  filterPerson: 'all',
  filterType: 'all',
  labels: { ...DEFAULT_LABELS },
  theme: 'dark',
  currentSiteId: null,
  currentSiteName: '',
  currentSiteCompleted: false,
  modal: null,
  editingEntry: null,
  _renameTarget: null,
  loaded: false
};

let formPhotoDataUrl = null; // ephemeral, only used while entry form modal is open

const root = document.getElementById('app');

const overlay = document.createElement('div');
overlay.id = 'modal-overlay';
overlay.className = 'modal-overlay';
document.body.appendChild(overlay);

const lightbox = document.createElement('div');
lightbox.id = 'lightbox';
lightbox.className = 'lightbox';
document.body.appendChild(lightbox);
lightbox.addEventListener('click', () => lightbox.classList.remove('visible'));

/* ------------------------------------------------------------
   Toast + custom confirm dialog.
   We deliberately avoid window.alert()/window.confirm() — many
   mobile browsers and in-app webviews silently block or ignore
   those native dialogs, which makes buttons that depend on them
   (like Delete) appear completely broken.
   ------------------------------------------------------------ */
const toastEl = document.createElement('div');
toastEl.id = 'toast';
toastEl.className = 'toast';
document.body.appendChild(toastEl);
let toastTimer = null;
function showToast(message) {
  toastEl.textContent = message;
  toastEl.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 2600);
}

let pendingConfirmCallback = null;
function showConfirm(message, confirmLabel, onConfirm) {
  pendingConfirmCallback = onConfirm;
  state.modal = 'confirm';
  state._confirmMessage = message;
  state._confirmLabel = confirmLabel || 'Delete';
  renderModal();
}

async function loadSites() {
  try {
    state.sites = await DB.getSites();
    state.labels = await DB.getLabels();
    state.theme = await DB.getTheme();
    applyTheme(state.theme);
    state.loaded = true;
    render();
  } catch (err) {
    console.error('loadSites failed:', err);
    state.loaded = true;
    render();
  }
}

async function openSite(siteId) {
  try {
    const site = state.sites.find(s => s.id === siteId);
    if (!site) return;
    state.view = 'ledger';
    state.currentSiteId = siteId;
    state.currentSiteName = site.name;
    state.currentSiteCompleted = !!site.completed;
    state.searchQuery = '';
    state.filterPerson = 'all';
    state.filterType = 'all';
    state.entries = await DB.getEntriesForSite(siteId);
    render();
  } catch (err) {
    console.error('openSite failed:', err);
    showToast('Could not open that site. Please try again.');
  }
}

async function refreshLedger() {
  try {
    state.entries = await DB.getEntriesForSite(state.currentSiteId);
    const sites = await DB.getSites();
    state.sites = sites;
    const site = sites.find(s => s.id === state.currentSiteId);
    if (site) {
      state.currentSiteName = site.name;
      state.currentSiteCompleted = !!site.completed;
    }
    render();
  } catch (err) {
    console.error('refreshLedger failed:', err);
    showToast('Could not refresh the ledger. Please try again.');
  }
}

function goBackToSites() {
  state.view = 'sites';
  state.currentSiteId = null;
  state.entries = [];
  loadSites();
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  if (!state.loaded) { root.innerHTML = ''; return; }
  root.innerHTML = state.view === 'sites' ? renderSitesScreen() : renderLedgerScreen();
}

function renderSitesScreen() {
  const listOrEmpty = state.sites.length === 0
    ? `<div class="empty-state">${ICONS.building}<div class="empty-title">No sites yet</div><div class="empty-subtitle">Add your first worksite to start tracking expenses and advances.</div></div>`
    : `<div class="scroll">${state.sites.map(siteCardHtml).join('')}</div>`;

  return `
    <div class="header">
      <div class="header-title">Sites</div>
      <button class="icon-btn" data-action="open-settings">${ICONS.settings}</button>
    </div>
    ${listOrEmpty}
    <div class="fab-wrap">
      <button class="btn-primary" data-action="open-add-site">${ICONS.plus}<span>Add New Site</span></button>
    </div>
  `;
}

function siteCardHtml(site) {
  const date = new Date(site.createdAt).toLocaleDateString();
  return `
    <div class="card ${site.completed ? 'completed' : ''}" data-action="open-site" data-id="${site.id}">
      <div class="card-info">
        <div class="card-name">${escapeHtml(site.name)}</div>
        <div class="card-subtitle">Created ${date}</div>
        ${site.completed ? `<div class="completed-badge">${ICONS.checkCircle} Completed</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="icon-btn" data-action="rename-site" data-id="${site.id}" style="color:var(--text-secondary)">${ICONS.edit}</button>
        <button class="icon-btn" data-action="delete-site" data-id="${site.id}" style="color:var(--expense)">${ICONS.trash}</button>
        <span style="color:var(--text-muted);display:flex">${ICONS.chevronRight}</span>
      </div>
    </div>
  `;
}

function renderLedgerScreen() {
  const balances = computeBalances(state.entries);
  const hasAnyEntries = state.entries.length > 0;
  const filtered = getFilteredEntries();

  const feedHtml = !hasAnyEntries
    ? `<div class="empty-state">${ICONS.listChecks}<div class="empty-title">No entries yet</div><div class="empty-subtitle">Log an advance or expense to start building this site's ledger.</div></div>`
    : `
      <div class="search-filter-bar">
        <div class="search-box">${ICONS.search}<input type="text" id="search-input" placeholder="Search description..." value="${escapeHtml(state.searchQuery)}" /></div>
        <div class="filter-row">
          <button class="filter-chip ${state.filterPerson==='all'?'active':''}" data-filter="person" data-value="all">All</button>
          <button class="filter-chip ${state.filterPerson==='me'?'active':''}" data-filter="person" data-value="me">${escapeHtml(state.labels.me)}</button>
          <button class="filter-chip ${state.filterPerson==='partner'?'active':''}" data-filter="person" data-value="partner">${escapeHtml(state.labels.partner)}</button>
          <span class="filter-sep"></span>
          <button class="filter-chip ${state.filterType==='all'?'active':''}" data-filter="type" data-value="all">All</button>
          <button class="filter-chip ${state.filterType==='advance'?'active':''}" data-filter="type" data-value="advance">Advance</button>
          <button class="filter-chip ${state.filterType==='expense'?'active':''}" data-filter="type" data-value="expense">Expense</button>
        </div>
      </div>
      <div class="scroll"><div id="entries-feed-list">${feedListHtml(filtered)}</div></div>
    `;

  return `
    <div class="header">
      <button class="icon-btn" data-action="back-to-sites">${ICONS.arrowLeft}</button>
      <div class="header-title center">${escapeHtml(state.currentSiteName)}</div>
      <div class="header-actions">
        <button class="icon-btn" data-action="export-entries">${ICONS.share}</button>
        <button class="icon-btn" data-action="rename-current-site">${ICONS.edit}</button>
      </div>
    </div>
    ${feedHtml}
    <div class="fab-wrap" style="padding-bottom:0">
      <button class="btn-primary" data-action="open-add-entry">${ICONS.plus}<span>Log Entry</span></button>
    </div>
    <div class="balance-summary">
      ${balanceRowHtml(state.labels.me, balances.me)}
      <div class="balance-divider"></div>
      ${balanceRowHtml(state.labels.partner, balances.partner)}
      <div class="settle-line">${settleUpText(balances, state.labels)}</div>
      ${state.currentSiteCompleted
        ? `<button class="btn-secondary warn" data-action="reopen-site">${ICONS.rotate}<span>Reopen Site</span></button>`
        : `<button class="btn-secondary" data-action="settle-and-complete">${ICONS.checkCircleLg}<span>Settle Up &amp; Complete Site</span></button>`}
    </div>
  `;
}

function getFilteredEntries() {
  const q = state.searchQuery.trim().toLowerCase();
  return state.entries.filter(e => {
    if (state.filterPerson !== 'all' && e.person !== state.filterPerson) return false;
    if (state.filterType !== 'all' && e.type !== state.filterType) return false;
    if (q && !(e.description || '').toLowerCase().includes(q)) return false;
    return true;
  });
}

function feedListHtml(list) {
  if (list.length === 0) return `<div class="empty-inline">No matching entries.</div>`;
  return list.map(entryCardHtml).join('');
}

function renderEntriesFeed() {
  const container = document.getElementById('entries-feed-list');
  if (!container) return;
  container.innerHTML = feedListHtml(getFilteredEntries());
}

function balanceRowHtml(label, value) {
  const positive = value >= 0;
  const color = positive ? 'var(--advance)' : 'var(--expense)';
  const status = positive ? 'Surplus' : 'Owed back';
  return `
    <div class="balance-row">
      <div>
        <div class="balance-label">${escapeHtml(label)}</div>
        <div class="balance-status" style="color:${color}">${status}</div>
      </div>
      <div class="balance-value" style="color:${color}">${formatCurrency(value)}</div>
    </div>
  `;
}

function entryCardHtml(entry) {
  const isAdvance = entry.type === 'advance';
  const accent = isAdvance ? 'var(--advance)' : 'var(--expense)';
  const bg = isAdvance ? 'var(--advance-muted)' : 'var(--expense-muted)';
  const icon = isAdvance ? ICONS.arrowDownCircle : ICONS.arrowUpCircle;
  const personIcon = entry.person === 'me' ? ICONS.user : ICONS.users;
  const personLabel = entry.person === 'me' ? state.labels.me : state.labels.partner;

  return `
    <div class="entry-card" data-action="edit-entry" data-id="${entry.id}">

          <span style="display:flex;color:var(--text-secondary)">${personIcon}</span>
          <span>${escapeHtml(personLabel)}</span>
          <span style="color:var(--text-muted)">·</span>
          <span style="color:${accent};font-weight:700">${isAdvance ? 'Advance' : 'Expense'}</span>
        </div>
        <div class="entry-desc">${escapeHtml(entry.description) || 'No description'}</div>
        <div class="entry-date">${formatDateTime(entry.dateTime)}${entry.hasPhoto ? `<span class="photo-badge">${ICONS.camera}</span>` : ''}</div>
      </div>
      <div class="entry-amount" style="color:${accent}">${sign}${formatCurrency(entry.amount)}</div>
    </div>

}

/* ============================================================
   MODALS
   ============================================================ */
function renderModal() {
  let html = '';
  let center = false;

  if (state.modal === 'addSite') {
    center = true;
    html = promptModalHtml({ title: 'New Site', placeholder: 'e.g. Riverside Renovation', confirmLabel: 'Create', value: '' });
  } else if (state.modal === 'renameSite') {
    center = true;
    html = promptModalHtml({ title: 'Rename Site', placeholder: 'Site name', confirmLabel: 'Save', value: state._renameTarget?.name || '' });
  } else if (state.modal === 'renameCurrentSite') {
    center = true;
    html = promptModalHtml({ title: 'Rename Site', placeholder: 'Site name', confirmLabel: 'Save', value: state.currentSiteName });
  } else if (state.modal === 'settings') {
    center = true;
    html = settingsModalHtml();
  } else if (state.modal === 'confirm') {
    center = true;
    html = confirmModalHtml(state._confirmMessage, state._confirmLabel);
  } else if (state.modal === 'entryForm') {
    html = entryFormModalHtml(state.editingEntry);
  }

  overlay.className = 'modal-overlay' + (center ? ' center' : '');
  overlay.innerHTML = html;
  requestAnimationFrame(() => overlay.classList.add('visible'));
}

function closeModal() {
  if (state.modal === 'settings') applyTheme(state.theme); // revert any live theme preview
  overlay.classList.remove('visible');
  setTimeout(() => { overlay.innerHTML = ''; }, 150);
  state.modal = null;
  state.editingEntry = null;
  state._renameTarget = null;
  state._confirmMessage = null;
  state._confirmLabel = null;
  pendingConfirmCallback = null;
  formPhotoDataUrl = null;
}

}

/* ============================================================
   EXPORT / SHARE
   ============================================================ */
function buildExportText() {
  const lines = [];
  lines.push(`${state.currentSiteName} — Ledger Export`);
  lines.push(`Generated ${new Date().toLocaleString()}`);
  lines.push('');
  state.entries.slice().sort((a, b) => a.dateTime - b.dateTime).forEach(e => {
    const person = e.person === 'me' ? state.labels.me : state.labels.partner;
    const sign = e.type === 'advance' ? '+' : '-';
    const desc = e.description || 'No description';
    lines.push(`${formatDateTime(e.dateTime)} | ${person} | ${desc} | ${sign}${formatCurrency(e.amount)}`);
  });
  const balances = computeBalances(state.entries);
  lines.push('');
  lines.push(`${state.labels.me}: ${formatCurrency(balances.me)}`);
  lines.push(`${state.labels.partner}: ${formatCurrency(balances.partner)}`);
  lines.push(settleUpText(balances, state.labels));
  return lines.join('\n');
}

async function exportEntries() {
  const text = buildExportText();
  if (navigator.share) {
    try {
      await navigator.share({ title: `${state.currentSiteName} Ledger`, text });
      return;
    } catch (e) {
      // user cancelled the share sheet, or share failed — fall through to clipboard
    }
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('Ledger copied to clipboard!');
  } catch (e) {
    window.prompt('Copy this text:', text);
  }
}

/**
 * Full-app backup file (all sites, entries, names, theme, and bill photos)
 * as a single JSON download. Uses a fixed filename each time — browsers
 * won't silently overwrite a prior download for security reasons, but a
 * fixed name means most file managers will prompt to replace it, or you
 * can delete older numbered copies yourself.
 */
async function exportBackupFile() {
  try {
    const backup = await DB.buildFullBackup();
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'site-ledger-backup.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    showToast('Backup downloading — save it somewhere safe (Drive, email, etc).');
  } catch (err) {
    console.error('Export backup failed:', err);
    showToast('Could not create the backup file.');
  }
}

async function importBackupFile(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data || data.app !== 'site-ledger') {
      showToast("That file doesn't look like a Flow Count backup.");
      return;
    }
    const madeWhen = data.exportedAt ? new Date(data.exportedAt).toLocaleString() : 'an unknown time';
    showConfirm(
      `Restore from this backup (made ${madeWhen})? This will replace ALL current data on this device.`,
      'Restore',
      async () => {
        await DB.restoreFullBackup(data);
        state.view = 'sites';
        state.currentSiteId = null;
        loadSites();
        showToast('Backup restored.');
      }
    );
  } catch (err) {
    console.error('Import backup failed:', err);
    showToast('Could not read that backup file.');
  }
}

/* ============================================================
   ACTION HANDLING
   ============================================================ */
async function handleAction(action, id, el) {
  try {
    await runAction(action, id, el);
  } catch (err) {
    console.error('Action failed:', action, err);
    // Safety net: never leave the overlay stuck on screen if something
    // inside an action throws or a storage call hangs/rejects.
    overlay.classList.remove('visible');
    overlay.innerHTML = '';
    state.modal = null;
    state.editingEntry = null;
    state._renameTarget = null;
    formPhotoDataUrl = null;
    showToast('Something went wrong with that action. Your saved data is safe — please try again.');
  }
}

async function runAction(action, id, el) {
  switch (action) {
    case 'open-site':
      openSite(id);
      break;
    case 'rename-site':
      state._renameTarget = state.sites.find(s => s.id === id);
      state.modal = 'renameSite';
      renderModal();
      break;
    case 'rename-current-site':
      state.modal = 'renameCurrentSite';
      renderModal();
      break;
    case 'delete-site': {
      const site = state.sites.find(s => s.id === id);
      showConfirm(
        `Delete "${site.name}"? This will permanently delete the site and all its entries.`,
        'Delete',
        async () => {
          await DB.deleteSite(id);
          loadSites();
        }
      );
      break;
    }
    case 'open-add-site':
      state.modal = 'addSite';
      renderModal();
      break;
    case 'open-settings': {
      const meta = await DB.getSnapshotMeta();
      state._lastSnapshotAt = meta ? meta.exportedAt : null;
      state.modal = 'settings';
      renderModal();
      break;
    }
    case 'quick-backup': {
      const ts = await DB.saveSnapshot();
      state._lastSnapshotAt = ts;
      showToast('Quick snapshot saved.');
      const infoEl = document.getElementById('snapshot-info');
      if (infoEl) infoEl.textContent = 'Last snapshot: ' + new Date(ts).toLocaleString();
      break;
    }
    case 'quick-restore': {
      const meta = await DB.getSnapshotMeta();
      if (!meta) { showToast('No snapshot saved yet.'); break; }
      showConfirm(
        `Restore your last snapshot (saved ${new Date(meta.exportedAt).toLocaleString()})? This will replace all current data on this device.`,
        'Restore',
        async () => {
          await DB.restoreSnapshot();
          state.view = 'sites';
          state.currentSiteId = null;
          loadSites();
          showToast('Snapshot restored.');
        }
      );
      break;
    }
    case 'export-backup':
      await exportBackupFile();
      break;
    case 'import-backup':
      document.getElementById('backup-file-input').click();
      break;
    case 'back-to-sites':
      goBackToSites();
      break;
    case 'export-entries':
      exportEntries();
      break;
    case 'settle-and-complete':
      confirmSettleAndComplete();
      break;
    case 'reopen-site':
      showConfirm(
        `Reopen "${state.currentSiteName}"? It will move back to the active list.`,
        'Reopen',
        async () => {
          await DB.setSiteCompleted(state.currentSiteId, false);
          refreshLedger();
        }
      );
      break;
    case 'open-add-entry':
      formPhotoDataUrl = null;
      state.editingEntry = null;
      state.modal = 'entryForm';
      renderModal();
      break;
    case 'edit-entry': {
      const entry = state.entries.find(en => en.id === id);
      state.editingEntry = entry;
      formPhotoDataUrl = entry.hasPhoto ? await DB.getPhoto(entry.id) : null;
      state.modal = 'entryForm';
      renderModal();
      break;
    }
    case 'close-modal':
      closeModal();
      break;
    case 'confirm-action': {
      const cb = pendingConfirmCallback;
      pendingConfirmCallback = null;
      closeModal();
      if (cb) await cb();
      break;
    }
    case 'confirm-prompt':
      await handlePromptConfirm();
      break;
    case 'save-settings':
      await handleSaveSettings();
      break;
    case 'save-entry':
      await handleSaveEntry();
      break;
    case 'delete-entry': {
      const entryToDelete = state.editingEntry;
      showConfirm('Delete this entry? This cannot be undone.', 'Delete', async () => {
        await DB.deleteEntry(entryToDelete.id);
        if (entryToDelete.hasPhoto) await DB.deletePhoto(entryToDelete.id);
        refreshLedger();
      });
      break;
    }
    case 'add-photo':
    case 'replace-photo':
      document.getElementById('photo-file-input').click();
      break;
    case 'remove-photo':
      formPhotoDataUrl = null;
      document.getElementById('photo-section').innerHTML = photoSectionHtml();
      break;
    case 'view-photo':
      if (formPhotoDataUrl) {
        lightbox.innerHTML = `<img src="${formPhotoDataUrl}" />`;
        lightbox.classList.add('visible');
      }
      break;
  }
}

async function handlePromptConfirm() {
  const input = document.getElementById('prompt-input');
  const value = input.value.trim();
  if (!value) return;

  if (state.modal === 'addSite') {
    await DB.addSite(value);
    closeModal();
    loadSites();
  } else if (state.modal === 'renameSite') {
    await DB.renameSite(state._renameTarget.id, value);
    closeModal();
    loadSites();
  } else if (state.modal === 'renameCurrentSite') {
    await DB.renameSite(state.currentSiteId, value);
    closeModal();
    refreshLedger();
  }
}

async function handleSaveSettings() {
  const myName = document.getElementById('settings-my-name').value.trim() || 'Me';
  const partnerName = document.getElementById('settings-partner-name').value.trim() || 'Partner';
  const customCurrency = document.getElementById('settings-custom-currency').value.trim();
  const currencyRow = document.getElementById('currency-chip-row');
  const themeRow = document.getElementById('theme-row');
  const selectedCurrency = customCurrency || currencyRow.dataset.selected || state.labels.currency;
  const selectedTheme = themeRow.dataset.selected || state.theme;

  const newLabels = { me: myName, partner: partnerName, currency: selectedCurrency };
  await DB.saveLabels(newLabels);
  await DB.saveTheme(selectedTheme);
  state.labels = newLabels;
  state.theme = selectedTheme;
  applyTheme(selectedTheme);
  closeModal();
  render();
}

async function handleSaveEntry() {
  const personGroup = overlay.querySelector('[data-group="person"]');
  const typeGroup = overlay.querySelector('[data-group="type"]');
  const amountInput = document.getElementById('entry-amount');
  const descInput = document.getElementById('entry-description');
  const dateInput = document.getElementById('entry-datetime');

  const amount = parseFloat(amountInput.value);
  if (isNaN(amount) || amount <= 0) {
    showToast('Please enter an amount greater than 0.');
    return;
  }

  const data = {
    person: personGroup.dataset.selected,
    type: typeGroup.dataset.selected,
    amount,
    description: descInput.value.trim(),
    dateTime: fromLocalInputValue(dateInput.value),
    hasPhoto: !!formPhotoDataUrl
  };

  let savedEntry;
  if (state.editingEntry) {
    await DB.updateEntry(state.editingEntry.id, data);
    savedEntry = { ...state.editingEntry, ...data };
  } else {
    savedEntry = await DB.addEntry({ ...data, siteId: state.currentSiteId });
  }

  if (formPhotoDataUrl) {
    await DB.savePhoto(savedEntry.id, formPhotoDataUrl);
  } else if (state.editingEntry && state.editingEntry.hasPhoto) {
    await DB.deletePhoto(savedEntry.id);
  }

  formPhotoDataUrl = null;
  closeModal();
  refreshLedger();
}

/* ============================================================
   EVENT DELEGATION (attached once, survives re-renders)
   ============================================================ */
root.addEventListener('click', (e) => {
  const filterChip = e.target.closest('.filter-chip');
  if (filterChip) {
    const kind = filterChip.dataset.filter;
    const value = filterChip.dataset.value;
    if (kind === 'person') state.filterPerson = value; else state.filterType = value;
    filterChip.parentElement.querySelectorAll(`.filter-chip[data-filter="${kind}"]`).forEach(c => c.classList.remove('active'));
    filterChip.classList.add('active');
    renderEntriesFeed();
    return;
  }
  const actionEl = e.target.closest('[data-action]');
  if (actionEl) handleAction(actionEl.dataset.action, actionEl.dataset.id, actionEl);
});

root.addEventListener('input', (e) => {
  if (e.target.id === 'search-input') {
    state.searchQuery = e.target.value;
    renderEntriesFeed();
  }
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) { closeModal(); return; }

  const toggleBtn = e.target.closest('.toggle-option');
  if (toggleBtn) {
    const group = toggleBtn.closest('.toggle-group');
    const groupName = group.dataset.group;
    const value = toggleBtn.dataset.value;
    group.querySelectorAll('.toggle-option').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
    toggleBtn.classList.add('active');
    toggleBtn.style.background = groupName === 'type'
      ? (value === 'advance' ? 'var(--advance)' : 'var(--expense)')
      : 'var(--primary)';
    group.dataset.selected = value;
    return;
  }

  const chipBtn = e.target.closest('.chip[data-currency]');
  if (chipBtn) {
    const row = chipBtn.closest('#currency-chip-row');
    row.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chipBtn.classList.add('active');
    document.getElementById('settings-custom-currency').value = '';
    row.dataset.selected = chipBtn.dataset.currency;
    return;
  }

  const themeBtn = e.target.closest('.theme-swatch');
  if (themeBtn) {
    const row = themeBtn.closest('#theme-row');
    row.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
    themeBtn.classList.add('active');
    row.dataset.selected = themeBtn.dataset.theme;
    applyTheme(themeBtn.dataset.theme);
    return;
  }

  const actionEl = e.target.closest('[data-action]');
  if (actionEl) handleAction(actionEl.dataset.action, actionEl.dataset.id, actionEl);
});

overlay.addEventListener('change', async (e) => {
  if (e.target.id === 'photo-file-input') {
    const file = e.target.files[0];
    if (!file) return;
    try {
      formPhotoDataUrl = await compressImage(file);
      document.getElementById('photo-section').innerHTML = photoSectionHtml();
    } catch (err) {
      showToast('Could not load that photo. Please try another.');
    }
  } else if (e.target.id === 'backup-file-input') {
    const file = e.target.files[0];
    if (!file) return;
    await importBackupFile(file);
    e.target.value = ''; // allow re-selecting the same filename later
  }
});

overlay.addEventListener('input', (e) => {
  if (e.target.id === 'settings-custom-currency' && e.target.value.trim()) {
    const row = document.getElementById('currency-chip-row');
    row.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  }
});

/* ============================================================
   INIT
   ============================================================ */
loadSites();
</script>
